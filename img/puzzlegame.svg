<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300"
     id="img-crystal-puzzle" data-product="crystal-puzzle" data-category="puzzle" data-track="true">
  <defs>
    <linearGradient id="bgGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1B4B"/>
    </linearGradient>
    <linearGradient id="crystalA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="100%" style="stop-color:#6D28D9"/>
    </linearGradient>
    <linearGradient id="crystalB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFD5"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
    <linearGradient id="crystalC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6"/>
      <stop offset="100%" style="stop-color:#BE185D"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad1)"/>

  <!-- Stars -->
  <circle cx="30" cy="20" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="80" cy="50" r="1" fill="white" opacity="0.4"/>
  <circle cx="340" cy="30" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="370" cy="80" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="260" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="360" cy="250" r="1" fill="white" opacity="0.6"/>
  <circle cx="200" cy="15" r="1" fill="white" opacity="0.5"/>
  <circle cx="300" cy="270" r="1.5" fill="white" opacity="0.3"/>

  <!-- Puzzle piece 1 (purple crystal) -->
  <g filter="url(#glow1)" transform="translate(90,70)">
    <polygon points="0,60 30,0 60,60 45,60 45,90 15,90 15,60" fill="url(#crystalA)" opacity="0.95"/>
    <polygon points="10,55 30,10 50,55" fill="#C4B5FD" opacity="0.4"/>
    <line x1="30" y1="5" x2="30" y2="85" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Puzzle piece 2 (teal crystal) -->
  <g filter="url(#glow1)" transform="translate(165,50)">
    <polygon points="35,0 70,50 55,100 15,100 0,50" fill="url(#crystalB)" opacity="0.95"/>
    <polygon points="35,10 60,50 35,90" fill="#67E8F9" opacity="0.3"/>
    <line x1="35" y1="5" x2="35" y2="95" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Puzzle piece 3 (pink crystal) -->
  <g filter="url(#glow1)" transform="translate(250,65)">
    <polygon points="30,0 60,40 50,90 10,90 0,40" fill="url(#crystalC)" opacity="0.95"/>
    <polygon points="30,8 52,42 30,82" fill="#FBCFE8" opacity="0.3"/>
    <line x1="30" y1="5" x2="30" y2="85" stroke="white" stroke-width="0.5" opacity="0.3"/>
  </g>

  <!-- Connecting glow lines -->
  <line x1="150" y1="120" x2="165" y2="110" stroke="#A78BFA" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>
  <line x1="235" y1="110" x2="250" y2="115" stroke="#00FFD5" stroke-width="1.5" opacity="0.5" stroke-dasharray="4,3"/>

  <!-- Bottom label area -->
  <rect x="0" y="220" width="400" height="80" fill="#0F172A" opacity="0.7"/>
  <text x="200" y="252" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#A78BFA">Crystal Puzzle</text>
  <text x="200" y="278" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00FFD5">Solve. Connect. Conquer.</text>

  <!-- Corner badge -->
  <rect x="10" y="10" width="80" height="24" rx="12" fill="#6D28D9" opacity="0.85"/>
  <text x="50" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="white">PUZZLE</text>
</svg>
