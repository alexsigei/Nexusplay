<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300"
     id="img-galactic-shooter" data-product="galactic-shooter" data-category="shooter" data-track="true">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F172A"/>
      <stop offset="100%" style="stop-color:#1E1035"/>
    </linearGradient>
    <linearGradient id="shipGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="thrusterGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFD5"/>
      <stop offset="100%" style="stop-color:#0891B2"/>
    </linearGradient>
    <filter id="glow3">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#bgGrad3)"/>

  <!-- Stars scattered -->
  <circle cx="20" cy="15" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="65" cy="45" r="1" fill="white" opacity="0.5"/>
  <circle cx="130" cy="25" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="200" cy="10" r="1" fill="white" opacity="0.7"/>
  <circle cx="280" cy="35" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="350" cy="18" r="1" fill="white" opacity="0.6"/>
  <circle cx="380" cy="60" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="40" cy="120" r="1" fill="white" opacity="0.5"/>
  <circle cx="370" cy="140" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="15" cy="200" r="1" fill="white" opacity="0.4"/>
  <circle cx="390" cy="190" r="1" fill="white" opacity="0.5"/>
  <circle cx="95" cy="75" r="1" fill="white" opacity="0.4"/>
  <circle cx="310" cy="90" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="160" cy="55" r="1" fill="white" opacity="0.6"/>

  <!-- Planet in bg -->
  <circle cx="330" cy="80" r="55" fill="#312E81" opacity="0.6"/>
  <ellipse cx="330" cy="80" rx="75" ry="14" fill="none" stroke="#818CF8" stroke-width="2" opacity="0.4"/>
  <circle cx="330" cy="80" r="55" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.3"/>
  <!-- Planet surface detail -->
  <path d="M290,60 Q310,55 330,62 Q350,68 360,60" fill="none" stroke="#4338CA" stroke-width="6" opacity="0.4"/>
  <path d="M300,85 Q320,80 340,88" fill="none" stroke="#4338CA" stroke-width="5" opacity="0.3"/>

  <!-- Enemy ships (small, top) -->
  <g transform="translate(60,55)" opacity="0.85" filter="url(#softglow)">
    <polygon points="15,0 0,20 30,20" fill="#EF4444"/>
    <polygon points="15,5 5,18 25,18" fill="#FCA5A5" opacity="0.4"/>
    <circle cx="15" cy="18" r="4" fill="#F97316" opacity="0.9"/>
  </g>
  <g transform="translate(110,40)" opacity="0.7" filter="url(#softglow)">
    <polygon points="12,0 0,16 24,16" fill="#DC2626"/>
    <circle cx="12" cy="14" r="3" fill="#FB923C" opacity="0.9"/>
  </g>
  <g transform="translate(140,65)" opacity="0.6">
    <polygon points="10,0 0,14 20,14" fill="#B91C1C"/>
    <circle cx="10" cy="12" r="2.5" fill="#F97316" opacity="0.8"/>
  </g>

  <!-- Laser bolts -->
  <rect x="198" y="100" width="4" height="20" rx="2" fill="#00FFD5" opacity="0.9" filter="url(#glow3)"/>
  <rect x="208" y="115" width="3" height="15" rx="1.5" fill="#00FFD5" opacity="0.6"/>

  <!-- Player spaceship (center) -->
  <g transform="translate(170,145)" filter="url(#softglow)">
    <!-- Thruster flames -->
    <polygon points="25,65 15,90 20,70" fill="#00FFD5" opacity="0.8"/>
    <polygon points="35,65 45,90 40,70" fill="#00FFD5" opacity="0.8"/>
    <polygon points="25,65 35,65 30,80" fill="#FDE68A" opacity="0.9"/>
    <!-- Ship body -->
    <polygon points="30,0 0,55 15,50 15,65 45,65 45,50 60,55" fill="url(#shipGrad)"/>
    <!-- Cockpit -->
    <ellipse cx="30" cy="22" rx="10" ry="14" fill="#A5B4FC" opacity="0.6"/>
    <ellipse cx="30" cy="22" rx="6" ry="9" fill="#E0E7FF" opacity="0.4"/>
    <!-- Wings detail -->
    <line x1="5" y1="45" x2="55" y2="45" stroke="#818CF8" stroke-width="1" opacity="0.5"/>
    <!-- Cannons -->
    <rect x="10" y="30" width="5" height="18" rx="2" fill="#4F46E5"/>
    <rect x="45" y="30" width="5" height="18" rx="2" fill="#4F46E5"/>
  </g>

  <!-- Explosion effect top-left -->
  <g transform="translate(75,90)" filter="url(#glow3)" opacity="0.8">
    <circle cx="0" cy="0" r="14" fill="#FCD34D" opacity="0.3"/>
    <circle cx="0" cy="0" r="8" fill="#F59E0B" opacity="0.7"/>
    <line x1="0" y1="-18" x2="0" y2="-10" stroke="#FCD34D" stroke-width="2"/>
    <line x1="13" y1="-13" x2="7" y2="-7" stroke="#FCD34D" stroke-width="2"/>
    <line x1="18" y1="0" x2="10" y2="0" stroke="#FCD34D" stroke-width="2"/>
    <line x1="13" y1="13" x2="7" y2="7" stroke="#FCD34D" stroke-width="2"/>
    <line x1="-18" y1="0" x2="-10" y2="0" stroke="#FCD34D" stroke-width="2"/>
  </g>

  <!-- Bottom label -->
  <rect x="0" y="232" width="400" height="68" fill="#0F172A" opacity="0.85"/>
  <text x="200" y="260" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#818CF8">Galactic Shooter</text>
  <text x="200" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#00FFD5">Fight. Survive. Dominate the cosmos.</text>

  <!-- Badge -->
  <rect x="10" y="10" width="90" height="24" rx="12" fill="#312E81" opacity="0.9"/>
  <text x="55" y="26" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#A5B4FC">SHOOTER</text>
</svg>
